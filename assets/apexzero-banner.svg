<svg width="1400" height="430" viewBox="0 0 1400 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="430">
      <stop offset="0" stop-color="#050814"/>
      <stop offset="0.45" stop-color="#07162e"/>
      <stop offset="1" stop-color="#120817"/>
    </linearGradient>

    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="shine" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="430" rx="28" fill="url(#bg)"/>
  <circle cx="180" cy="110" r="180" fill="#ef4444" opacity="0.12"/>
  <circle cx="1220" cy="330" r="210" fill="#38bdf8" opacity="0.10"/>
  <circle cx="700" cy="210" r="330" fill="url(#shine)"/>

  <rect x="45" y="45" width="1310" height="340" rx="24" fill="#020617" fill-opacity="0.55" stroke="#334155"/>
  <rect x="70" y="70" width="310" height="120" rx="18" fill="#7f1d1d" fill-opacity="0.62" stroke="#ef4444" filter="url(#glow)"/>
  <rect x="405" y="70" width="310" height="120" rx="18" fill="#0f3b74" fill-opacity="0.62" stroke="#38bdf8" filter="url(#glow)"/>
  <rect x="740" y="70" width="310" height="120" rx="18" fill="#312e81" fill-opacity="0.62" stroke="#a78bfa" filter="url(#glow)"/>
  <rect x="1075" y="70" width="230" height="120" rx="18" fill="#111827" fill-opacity="0.65" stroke="#64748b"/>

  <text x="105" y="125" fill="#ffffff" font-family="Segoe UI, Arial" font-size="34" font-weight="800">APEXZERO</text>
  <text x="105" y="160" fill="#e5e7eb" font-family="Segoe UI, Arial" font-size="17">Automation • Security</text>

  <text x="445" y="125" fill="#ffffff" font-family="Segoe UI, Arial" font-size="34" font-weight="800">REACT</text>
  <text x="445" y="160" fill="#e5e7eb" font-family="Segoe UI, Arial" font-size="17">Modern UI • Dashboards</text>

  <text x="780" y="125" fill="#ffffff" font-family="Segoe UI, Arial" font-size="34" font-weight="800">PYTHON</text>
  <text x="780" y="160" fill="#e5e7eb" font-family="Segoe UI, Arial" font-size="17">Automation • Trading</text>

  <text x="1110" y="125" fill="#ffffff" font-family="Segoe UI, Arial" font-size="30" font-weight="800">CLOUD</text>
  <text x="1110" y="160" fill="#e5e7eb" font-family="Segoe UI, Arial" font-size="17">APIs • Backend</text>

  <text x="700" y="275" text-anchor="middle" fill="url(#name)" font-family="Segoe UI, Arial" font-size="58" font-weight="900" filter="url(#glow)">Aamir Akram</text>
  <text x="700" y="320" text-anchor="middle" fill="#e5e7eb" font-family="Segoe UI, Arial" font-size="24">Full Stack Developer • Cybersecurity Learner • AI Automation Builder</text>
  <text x="700" y="355" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial" font-size="18">Building secure web platforms, automation tools, trading systems and digital products under ApexZero.</text>

  <line x1="140" y1="400" x2="1260" y2="400" stroke="#38bdf8" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
</svg>
